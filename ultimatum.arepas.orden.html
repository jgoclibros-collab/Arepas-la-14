.header h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:1px;text-shadow:0 2px 6px rgba(0,0,0,0.6);}
.header p{font-size:23px;color:#f9a840;margin-top:6px;font-weight:700;letter-spacing:.5px;text-shadow:0 1px 4px rgba(0,0,0,0.5);}

/* Caja por seccion del menu */
.menu-section{background:#fff7f0;border:1px solid #d4a07a;border-radius:14px;padding:.75rem .85rem 0.5rem;margin-bottom:1rem;box-shadow:0 2px 6px rgba(80,30,0,0.10);}
.section-title{font-size:12px;font-weight:700;color:#7a3a0a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:.55rem;padding:0 2px;}

.item-card{display:flex;align-items:center;justify-content:space-between;background:#fff;border:0.5px solid #e8c9a8;border-radius:var(--border-radius-md);padding:.65rem .9rem;margin-bottom:.45rem;cursor:pointer;transition:border-color .15s,background .15s;}
.item-card:last-child{margin-bottom:0;}
.item-card:hover{border-color:#e55a00;background:#fff8f5;}
.item-card.selected{border-color:#e55a00;background:#fff3ec;}
.item-name{font-size:14px;color:#2a1208;}
.item-price{font-size:13px;color:#8a5020;margin-top:1px;}
.item-right{display:flex;align-items:center;gap:8px;}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid #d4a07a;background:#f5e6d5;color:#2a1208;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.qty-btn:hover{background:#e8c9a8;}
.qty-num{font-size:14px;font-weight:500;min-width:16px;text-align:center;color:#2a1208;}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #d4a07a;display:flex;align-items:center;justify-content:center;}
.check-circle.on{background:#e55a00;border-color:#e55a00;}
.check-circle.on::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.cart-bar{background:#e8f8ee;border:1px solid #128C3E;border-radius:var(--border-radius-lg);padding:1rem 1.1rem;margin-top:1.2rem;box-shadow:0 2px 8px rgba(18,140,62,0.2);}
.cart-title{font-size:13px;font-weight:700;color:#0a5c28;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.5px;}
.cart-empty{font-size:13px;color:#a06030;text-align:center;padding:.4rem 0;}
.cart-item{display:flex;justify-content:space-between;font-size:13px;color:#2a1208;padding:3px 0;}
.cart-item span:last-child{color:#8a5020;}
.cart-divider{border:none;border-top:1px solid #e8c9a8;margin:.6rem 0;}
.cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:500;color:#2a1208;}
.send-btn{margin-top:.9rem;width:100%;padding:.75rem;background:#128C3E;border:none;border-radius:var(--border-radius-md);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 3px 10px rgba(18,140,62,0.5);}
.send-btn:hover{opacity:.92;}
.send-btn:disabled{background:#5aab7a;color:#fff;cursor:not-allowed;opacity:0.6;}
.send-btn svg{width:18px;height:18px;fill:#fff;}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:999px;margin-left:6px;background:#fff3ec;color:#993C1D;}
</style>

      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

</div>

<script>
const PHONE = "573108600638";
const menu = [
  {section:"Sencillas", items:[
    {id:"s1",name:"Huevo frito y queso",price:3000},
    {id:"s2",name:"Huevo cocido y queso",price:3000},
    {id:"s3",name:"Jamon y queso",price:3000},
  ]},
  {section:"Proteinas", items:[
    {id:"p1",name:"Pollo",price:4000},
    {id:"p2",name:"Carne",price:4000},
    {id:"p3",name:"Cerdo ahumado",price:4000},
    {id:"p4",name:"Salchicha",price:4000},
    {id:"p5",name:"Diablito",price:4000},
    {id:"p6",name:"Pollo mechado",price:4000},
    {id:"p7",name:"Carne mechada",price:4000},
    {id:"p8",name:"Cerdo ahumado picado",price:4000},
  ]},
  {section:"Combinaciones", items:[
    {id:"c1",name:"Proteina + Huevo",price:5000},
    {id:"c2",name:"Proteina + Jamon",price:5000},
    {id:"c3",name:"Doble proteina",price:6000},
    {id:"c4",name:"Trifasica",price:9000},
  ]},
  {section:"Picada Explosiva", items:[
    {id:"e1",name:"Picada Explosiva",price:16000,tag:"Especial"},
  ]},
];

const order = {};

function fmt(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(n);}

function renderMenu(){
  const el = document.getElementById('menu');
  el.innerHTML = menu.map(sec=>`
    <div class="menu-section">
    <div class="section-title">${sec.section}</div>
    ${sec.items.map(item=>`
      <div class="item-card${order[item.id]?' selected':''}" id="card-${item.id}" onclick="toggle('${item.id}')">
        <div>
          <div class="item-name">${item.name}${item.tag?`<span class="tag">${item.tag}</span>`:''}</div>
          <div class="item-price">${fmt(item.price)}</div>
        </div>
        <div class="item-right">
          ${order[item.id]?`
            <div class="qty-ctrl" onclick="event.stopPropagation()">
              <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
              <span class="qty-num">${order[item.id]}</span>
              <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
            </div>
          `:`<div class="check-circle${order[item.id]?' on':''}"></div>`}
        </div>
      </div>
    `).join('')}
    </div>
  `).join('');
}

function getItem(id){for(const s of menu)for(const i of s.items)if(i.id===id)return i;}

function toggle(id){
  if(order[id])delete order[id];
  else order[id]=1;
  renderMenu();renderCart();
}

function changeQty(id,delta){
  order[id]=(order[id]||0)+delta;
  if(order[id]<=0)delete order[id];
  renderMenu();renderCart();
}

function renderCart(){
  const keys=Object.keys(order);
  const ci=document.getElementById('cart-items');
  const cd=document.getElementById('cart-divider');
  const ct=document.getElementById('cart-total');
  const tv=document.getElementById('total-val');
  const btn=document.getElementById('send-btn');
  if(!keys.length){
    ci.innerHTML='<div class="cart-empty">Aun no has seleccionado nada</div>';
    cd.style.display='none';ct.style.display='none';btn.disabled=true;return;
  }
  let total=0;
  ci.innerHTML=keys.map(id=>{
    const item=getItem(id);
    const sub=item.price*order[id];total+=sub;
    return `<div class="cart-item"><span>${order[id]}× ${item.name}</span><span>${fmt(sub)}</span></div>`;
  }).join('');
  cd.style.display='';ct.style.display='flex';tv.textContent=fmt(total);btn.disabled=false;
}

function sendWhatsApp(){
  const keys=Object.keys(order);
  if(!keys.length)return;
  let total=0;
  const lines=keys.map(id=>{
    const item=getItem(id);
    const sub=item.price*order[id];total+=sub;
    return `• ${order[id]}x ${item.name} — ${fmt(sub)}`;
  });
  const msg=`*Pedido — Arepas La 14*\n\n${lines.join('\n')}\n\n*Total: ${fmt(total)}*`;
  const url=`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
  openLink(url);
}

renderMenu();renderCart();
</script>
